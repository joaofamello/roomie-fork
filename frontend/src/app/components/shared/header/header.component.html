<header class="topbar-blue">
  <button (click)="onLogoClick()" class="logo-text" title="Início">
    <img src="/negativo_h.svg" alt="Logo do Roomie" class="logo-img">
  </button>

  <div class="header-buttons">
    <button (click)="goToCreateProperty()" *ngIf="showCreateProperty" class="outline-btn">
      + Cadastrar Imóvel
    </button>

    <!-- Sino de notificações -->
    <div *ngIf="user$ | async" class="notif-wrapper">
      <button (click)="toggleNotif()" class="notif-btn" aria-label="Notificações">
        <span class="material-icons">notifications</span>
        <span *ngIf="unreadCount > 0" class="notif-badge">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
      </button>

      <div *ngIf="isNotifOpen" class="notif-dropdown">
        <div class="notif-header">
          <span>Notificações</span>
          <button *ngIf="unreadCount > 0" (click)="markAllAsRead()" class="mark-all-btn">
            Marcar todas como lidas
          </button>
        </div>

        <div *ngIf="notifications.length === 0" class="notif-empty">
          <span class="material-icons">notifications_none</span>
          <p>Nenhuma notificação</p>
        </div>

        <ul *ngIf="notifications.length > 0" class="notif-list">
          <li
            *ngFor="let notif of notifications"
            class="notif-item"
            [class.notif-unread]="!notif.read"
            (click)="markAsRead(notif)"
          >
            <span class="material-icons notif-icon">{{ notif.read ? 'notifications_none' : 'notifications_active' }}</span>
            <div class="notif-content">
              <p class="notif-message">{{ notif.message }}</p>
              <span class="notif-time">{{ notif.createdAt | date:'dd/MM/yyyy HH:mm' }}</span>
            </div>
            <span *ngIf="!notif.read" class="notif-dot"></span>
          </li>
        </ul>
      </div>
    </div>

    <div *ngIf="user$ | async as user" class="user-menu-wrapper">
      <button
        (click)="toggleMenu()"
        (keydown)="onButtonKeydown($event)"
        [attr.aria-expanded]="isMenuOpen"
        [attr.aria-label]="'Menu do usuário ' + user.name"
        aria-controls="user-dropdown-menu"
        aria-haspopup="true"
        class="user-button"
      >
        <span aria-hidden="true" class="user-initials">{{ getInitials(user.name) }}</span>
        <span aria-hidden="true" class="arrow-down">▾</span>
      </button>

      <div
        (keydown)="onMenuKeydown($event)"
        *ngIf="isMenuOpen"
        aria-label="Menu do usuário"
        class="user-dropdown"
        id="user-dropdown-menu"
        role="menu"
      >
        <!-- Cabeçalho com nome e e-mail -->
        <div aria-hidden="true" class="dropdown-user-info">
          <div class="dropdown-avatar">{{ getInitials(user.name) }}</div>
          <div class="dropdown-user-text">
            <strong>{{ user.name }}</strong>
            <span>{{ user.email }}</span>
          </div>
        </div>

        <hr aria-hidden="true" />

        <ul>
          <li>
            <button (click)="goToProfile()" class="dropdown-menu-item" role="menuitem">
              <span aria-hidden="true" class="material-icons">person_outline</span>
              Minha conta
            </button>
          </li>

          <li>
            <button (click)="goToFavorites()" class="dropdown-menu-item" role="menuitem">
              <span aria-hidden="true" class="material-icons">favorite_border</span>
              Favoritos
            </button>
          </li>

          <li>
            <button (click)="goToRecommendations()" class="dropdown-menu-item" role="menuitem">
              <span aria-hidden="true" class="material-icons">people</span>
              Recomendações
            </button>
          </li>

          <li>
            <button (click)="goToCreateProperty()" class="dropdown-menu-item" role="menuitem">
              <span aria-hidden="true" class="material-icons">add_circle_outline</span>
              Cadastrar Imóvel
            </button>
          </li>

          <li>
            <button (click)="goToMyProperties()" class="dropdown-menu-item" role="menuitem">
              <span aria-hidden="true" class="material-icons">home_work</span>
              Meus Imóveis
            </button>
          </li>

          <li>
            <button (click)="goToChats()" class="dropdown-menu-item" role="menuitem">
              <span aria-hidden="true" class="material-icons">chat</span>
              Conversas
            </button>
          </li>

          <!-- Visível apenas para não-administradores -->
          <li *ngIf="user.role !== 'ADMIN'">
            <button (click)="goToStudentProfile()" class="dropdown-menu-item" role="menuitem">
              <span aria-hidden="true" class="material-icons">school</span>
              Minha Instituição
            </button>
          </li>

          <li *ngIf="user.role !== 'ADMIN'">
            <button (click)="goToHabits()" class="dropdown-menu-item" role="menuitem">
              <span aria-hidden="true" class="material-icons">psychology</span>
              Meus Hábitos
            </button>
          </li>

          <hr aria-hidden="true" />

          <li>
            <button (click)="onLogout()" class="dropdown-menu-item logout-item" role="menuitem">
              <span aria-hidden="true" class="material-icons">logout</span>
              Sair
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
