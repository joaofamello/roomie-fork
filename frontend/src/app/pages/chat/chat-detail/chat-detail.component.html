<app-header></app-header>

<!-- Page header — idêntico ao recommendations -->
<div class="chat-page-header">
  <button class="btn-back" (click)="goBack()">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Voltar
  </button>
  <h1 *ngIf="chat">
    <span class="material-icons" aria-hidden="true">chat</span>
    {{ otherPartyName() }}
    <span class="header-property">— {{ chat.propertyTitle }}</span>
  </h1>
</div>

<div class="chat-page">

  <!-- Sidebar: info do contato -->
  <div class="chat-sidebar">
    <div class="chat-info-card" *ngIf="chat">
      <div class="info-avatar">
        <span class="material-icons">person</span>
      </div>
      <div class="info-details">
        <span class="info-name">{{ otherPartyName() }}</span>
        <span class="info-property">
          <span class="material-icons tiny">home</span>
          {{ chat.propertyTitle }}
        </span>
      </div>
    </div>
  </div>

  <!-- Main chat area -->
  <div class="chat-main">

    <!-- Loading -->
    <div class="messages-loading" *ngIf="isLoading">
      <span class="material-icons spinning">sync</span>
      <p>Carregando mensagens...</p>
    </div>

    <!-- Messages -->
    <div class="messages-container" #messagesContainer *ngIf="!isLoading">

      <div class="messages-empty" *ngIf="messages.length === 0">
        <span class="material-icons">chat_bubble_outline</span>
        <p>Nenhuma mensagem ainda. Diga olá! 👋</p>
      </div>

      <div
        *ngFor="let msg of messages"
        class="message-wrapper"
        [class.mine]="isMine(msg)"
        [class.theirs]="!isMine(msg)">
        <div class="bubble">
          <p class="bubble-text">{{ msg.content }}</p>
          <span class="bubble-time">
            {{ msg.timestamp | date:'HH:mm' }}
            <span class="material-icons read-icon" *ngIf="isMine(msg)">
              {{ msg.read ? 'done_all' : 'done' }}
            </span>
          </span>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="message-input-bar" *ngIf="!isLoading">
      <textarea
        class="message-input"
        [(ngModel)]="newMessage"
        (keydown)="onKeydown($event)"
        placeholder="Digite uma mensagem... (Enter para enviar)"
        rows="1"
        [disabled]="isSending"
        aria-label="Escrever mensagem">
      </textarea>
      <button
        class="btn-send"
        (click)="sendMessage()"
        [disabled]="!newMessage.trim() || isSending"
        aria-label="Enviar mensagem">
        <span class="material-icons">{{ isSending ? 'hourglass_empty' : 'send' }}</span>
      </button>
    </div>

  </div>
</div>
